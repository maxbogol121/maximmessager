<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Максим</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 400px; margin: 20px auto; background: #f0f2f5; }
        #chat { background: white; height: 400px; overflow-y: auto; padding: 15px; border-radius: 10px; border: 1px solid #ddd; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #e9ecef; padding: 8px 12px; border-radius: 15px; align-self: flex-start; }
        input { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Чат Максим</h3>
    <div id="chat">Загрузка...</div>
    <input id="msg" placeholder="Твоё сообщение...">
    <button onclick="send()">Отправить</button>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbz1Qs_gntM888L19jM7NpJBu2HBEaP9V8VpPP4rPU1mV74KdlX-ZF2PMUSxiHfT3USN/exec';

        async function send() {
            const input = document.getElementById('msg');
            if(!input.value) return;
            await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ user: 'Я', msg: input.value }) });
            input.value = '';
            load();
        }

        async function load() {
            const res = await fetch(scriptUrl);
            const data = await res.json();
            const chat = document.getElementById('chat');
            chat.innerHTML = data.map(m => `<div class="msg">${m.text || m[2]}</div>`).join('');
            chat.scrollTop = chat.scrollHeight;
        }

        setInterval(load, 3000); // Авто-обновление каждые 3 секунды
        load();
    </script>
</body>
</html>
